apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kong-root-cert
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kong-ca-cert
spec:
  commonName: kong-ca-cert
  duration: 2160h0m0s
  isCA: true
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: kong-root-cert
  privateKey:
    algorithm: ECDSA
    size: 256
  renewBefore: 360h0m0s
  secretName: kong-selfsigned-ca-cert
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kong-ca
spec:
  ca:
    secretName: kong-ca-cert
