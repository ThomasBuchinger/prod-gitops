---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netalertx-http
  namespace: netalertx
spec:
  rules:
    - host: network.10.0.0.21.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netalertx
                port:
                  name: http

