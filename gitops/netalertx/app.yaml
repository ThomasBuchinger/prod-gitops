---
apiVersion: v1
kind: Namespace
metadata:
  name: netalertx
  labels:
    # Allow syncthing to use hostnetwork for it's Local LAN Discovery
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/version: latest

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: netalertx-config
  namespace: netalertx
data:
  LISTEN_ADDR: "0.0.0.0"
  PORT: "20211"
  GRAPHQL_PORT: "20212"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netalertx
  namespace: netalertx
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: netalertx
  template:
    metadata:
      labels:
        app: netalertx
    spec:
      # initContainers:
      # - name: litestream-restore
      #   image: litestream/litestream:0.5.2
      #   args:
      #   - 'restore'
      #   - '-if-db-not-exists'
      #   - '-if-replica-exists'
      #   - /data/db.sqlite3
      #   volumeMounts:
      #   - name: netalertx-data
      #     mountPath: /data
      #   - name: litestream-config
      #     mountPath: /etc/litestream.yml
      #     subPath: litestream.yml
      #   env:
      #   - name: LITESTREAM_ACCESS_KEY_ID
      #     valueFrom:
      #       secretKeyRef:
      #         name: common-secrets
      #         key: s3_accesskey
      #   - name: LITESTREAM_SECRET_ACCESS_KEY
      #     valueFrom:
      #       secretKeyRef:
      #         name: common-secrets
      #         key: s3_secretkey
        # securityContext:
      #     capabilities:
      #       drop:
      #       - ALL
      #     runAsUser: 1000
      #     runAsGroup: 1000
      #     runAsNonRoot: true
      #     privileged: false
      #     readOnlyRootFilesystem: true

      containers:
      - name: netalertx
        image: ghcr.io/jokob-sk/netalertx:25.11
        envFrom:
        - configMapRef:
            name: netalertx-config
        ports:
        - name: http
          containerPort: 20211
        - name: graphql
          containerPort: 20212
        securityContext:
        #   capabilities:
        #     drop:
        #     - ALL
        #     add:
        #     - NET_ADMIN
        #     - NET_RAW
        #     # - NET_BIND_SERVICE
          runAsUser: 0
          runAsGroup: 20211
        #   # runAsNonRoot: true
        #   privileged: false
        #   # readOnlyRootFilesystem: true
        volumeMounts:
        # - name: netalertx-data
        #   mountPath: /data
        - name: netalertx-tmp
          mountPath: /tmp

      # Litestream
      # - name: litestream
      #   image: litestream/litestream:0.5.2
      #   args:
      #   - 'replicate'
      #   volumeMounts:
      #   - name: netalertx-data
      #     mountPath: /data
      #   - name: litestream-config
      #     mountPath: /etc/litestream.yml
      #     subPath: litestream.yml
      #   env:
      #   - name: LITESTREAM_ACCESS_KEY_ID
      #     valueFrom:
      #       secretKeyRef:
      #         name: common-secrets
      #         key: s3_accesskey
      #   - name: LITESTREAM_SECRET_ACCESS_KEY
      #     valueFrom:
      #       secretKeyRef:
      #         name: common-secrets
      #         key: s3_secretkey
      #   ports:
      #   - name: metrics
      #     containerPort: 9090
      #   securityContext:
      #     capabilities:
      #       drop:
      #       - ALL
      #     runAsUser: 1000
      #     runAsGroup: 1000
      #     runAsNonRoot: true
      #     privileged: false
      #     readOnlyRootFilesystem: true
      # resources:
      #   requests:
      #     cpu: 100m
      #     memory: 1024M
      #   limits:
      #     memory: 2048M
      securityContext:
        fsGroup: 20211

      hostNetwork: true
      volumes:
      - name: netalertx-data
        emptyDir: {}
      - name: netalertx-tmp
        emptyDir: {}
        # persistentVolumeClaim:
        #   claimName: netalertx-pvc
      # - name: litestream-config
      #   configMap:
      #     name: litestream-config

---
apiVersion: v1
kind: Service
metadata:
  name: netalertx
  namespace: netalertx
spec:
  selector:
    app: netalertx
  ports:
  - name: http
    port: 20211
    targetPort: http
  - name: graphql
    port: 20212
    targetPort: graphql
  type: ClusterIP

